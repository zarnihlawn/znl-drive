<!doctype html>

<html lang="%paraglide.lang%" data-theme="light" data-font="Adwaita-sans">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

		<script>
			/* Theme names should stay in sync with src/lib/user-settings/daisy-themes.ts */
			(function () {
				var themes = [
					'light',
					'dark',
					'cupcake',
					'bumblebee',
					'emerald',
					'corporate',
					'synthwave',
					'retro',
					'cyberpunk',
					'valentine',
					'halloween',
					'garden',
					'forest',
					'aqua',
					'lofi',
					'pastel',
					'fantasy',
					'wireframe',
					'black',
					'luxury',
					'dracula',
					'cmyk',
					'autumn',
					'business',
					'acid',
					'lemonade',
					'night',
					'coffee',
					'winter',
					'dim',
					'nord',
					'sunset',
					'caramellate',
					'abyss',
					'silk'
				];
				try {
					var theme = localStorage.getItem('theme');
					if (theme && themes.indexOf(theme) !== -1) {
						document.documentElement.setAttribute('data-theme', theme);
					}
				} catch (e) {}
			})();

			(function () {
				var fonts = ['adwaita-sans', 'adwaita-mono', 'roboto', 'comic-relief', 'pangolin'];
				var fonts = ['Adwaita-sans', 'Adwaita-mono', 'Roboto', 'Comic-relief', 'Pangolin'];
				try {
					var font = localStorage.getItem('font');
					if (font && fonts.indexOf(font) !== -1) {
						document.documentElement.setAttribute('data-font', font);
					}
				} catch (e) {}
			})();

			(function () {
				try {
					var v = localStorage.getItem('uiFontScale');
					if (v) {
						var n = parseFloat(v);
						if (!isNaN(n) && n >= 0.75 && n <= 1.5) {
							document.documentElement.style.setProperty('--app-font-scale', String(n));
						}
					}
				} catch (e) {}
			})();
		</script>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
