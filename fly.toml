# fly.toml app configuration file generated for znl-drive on 2026-03-28T22:40:06+06:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'znl-drive'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# Fly’s edge sets X-Forwarded-Proto (https). The VM still sees HTTP internally, so without this
# SvelteKit may think the site is http://… and reject POST forms with:
#   "Cross-site POST form submissions are forbidden"
# Also set ORIGIN to the same public URL (Better Auth baseURL), e.g.:
#   fly secrets set ORIGIN=https://your-app.fly.dev
[env]
  PROTOCOL_HEADER = 'x-forwarded-proto'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
